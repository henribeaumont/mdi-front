<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>MDI Config</title>
  <style>
    body { width: 250px; padding: 15px; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #0f172a; color: white; margin: 0; }
    h3 { margin-top: 0; color: #3b82f6; display: flex; align-items: center; gap: 8px; font-size: 16px; }
    label { display: block; margin-bottom: 5px; font-size: 12px; color: #94a3b8; }
    input { width: 100%; padding: 10px; margin-bottom: 15px; border-radius: 6px; border: 1px solid #334155; background: #1e293b; color: white; box-sizing: border-box; }
    input:focus { outline: none; border-color: #3b82f6; }
    button { width: 100%; padding: 10px; background: #3b82f6; color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; transition: background 0.2s; }
    button:hover { background: #2563eb; }
    .status { margin-top: 10px; font-size: 12px; color: #22c55e; text-align: center; display: none; }
  </style>
</head>
<body>
  <h3>🚀 MDI Config</h3>

  <label>ID Client (Room ID)</label>
  <input type="text" id="roomId" placeholder="Ex: DEMO_CLIENT">

  <button id="saveBtn">💾 Sauvegarder</button>

  <div id="status" class="status">✅ Sauvegardé ! Actualisez la page.</div>

  <script src="popup.js"></script>
</body>
</html>
